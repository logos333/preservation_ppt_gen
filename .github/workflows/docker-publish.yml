name: Build & Publish Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Логинимся в GHCR (чтобы был доступ к скачиванию, даже если пакет приватный)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Останавливаем старый контейнер (если есть)
            docker rm -f preservation-ppt-tgbot || true
            
            # Скачиваем новый образ
            docker pull ghcr.io/logos333/preservation_ppt_gen:latest
            
            # Запускаем новый контейнер с нужными флагами
            docker run -d \
              -p 8101:8101 \
              --name preservation-ppt-tgbot \
              -e TZ=Asia/Tashkent \
              -v ~/preservation-photos:/app/photos \
              --env-file ~/preservation_ppt_gen.env \
              ghcr.io/logos333/preservation_ppt_gen:latest
            
            # Чистим старые неиспользуемые образы
            docker image prune -f
